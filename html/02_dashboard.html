<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clube - Dashboard</title>
    <link rel="stylesheet" href="../css/11_global.css">
    <link rel="stylesheet" href="../css/02_dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="layout-interno">
    <aside class="cozy-sidebar">
        <div class="sidebar-logo">
            <h2>📖 Meu Clube</h2>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="02_dashboard.html" class="nav-link">
                        <i class="fa-solid fa-chart-simple"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="04_estante.html" class="nav-link">
                        <i class="fa-solid fa-book"></i> Estante
                    </a>
                </li>
                <li>
                    <a href="06_clubes.html" class="nav-link">
                        <i class="fa-solid fa-users"></i> Clubes
                    </a>
                </li>
                <li>
                    <a href="09_perfil.html" class="nav-link">
                        <i class="fa-solid fa-user-gear"></i> Perfil
                    </a>
                </li>
                <li>
                    <a href="10_configuracoes.html" class="nav-link">
                        <i class="fa-solid fa-gear"></i> Configurações
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container">

        <header class="dash-header">
            <div class="dash-search-container">
                <form action="03_pesquisa.html" method="GET" class="dash-search-form">
                    <input type="text" name="busca" class="dash-search-input"
                        placeholder="Pesquisar por título ou ISBN..." required>
                    <button type="submit" class="dash-search-btn">Pesquisar</button>
                </form>
            </div>

            <div class="header-user-actions">
                <span id="user-display-name" class="user-welcome-text">Carregando...</span>
                <a href="09_perfil.html" class="btn-perfil">Perfil</a>
                <button id="btn-logout" class="btn-logout-header" title="Sair do Clube">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <main class="conteudo-principal">
            <div class="dash-content-wrapper">
                <section class="welcome-banner">
                    <h2>Bem-vindo(a) de volta ao seu refúgio literário! ✨</h2>
                    <p>O que vamos ler e registrar hoje?</p>
                </section>

                <section class="grid-atalhos">
                    <a href="04_estante.html" class="card-atalho">
                        <span>📚</span>
                        Estante
                    </a>
                    <a href="06_clubes.html" class="card-atalho">
                        <span>💬</span>
                        Clubes
                    </a>
                </section>
            </div>
        </main>

    </div>

    <script src="../js/11_sidebar.js"></script>
    <script type="module" src="../js/02_dashboard.js"></script>
</body>

</html>
