<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube do Livro - Entrar ou Cadastrar</title>
    <link rel="stylesheet" href="../css/11_global.css">
    <link rel="stylesheet" href="../css/01_login.css">
</head>

<body>

    <header class="login-header">
        <div class="logo">
            <h1><a href="../index.html">📖 Meu Clube</a></h1>
        </div>
    </header>

    <main class="login-main">
        <div class="login-container">

            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active">Entrar</button>
                <button id="tab-cadastro" class="tab-btn">Criar Conta</button>
            </div>

            <form id="form-login" class="auth-form">
                <h3>Que bom te ver de volta!</h3>

                <div class="input-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu.email@exemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="Sua senha secreta" required>
                </div>

                <button type="submit" class="btn-cta">Entrar no Clube</button>

                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
            </form>

            <form id="form-cadastro" class="auth-form d-none">
                <div class="input-group">
                    <label for="cadastro-nome">Nome Completo</label>
                    <input type="text" id="cadastro-nome" required placeholder="Seu nome completo">
                </div>

                <div class="input-group">
                    <label for="cadastro-username">Nome de Usuário (Username)</label>
                    <input type="text" id="cadastro-username" required placeholder="Ex: prischeller (Não use @)">
                </div>

                <div class="input-group">
                    <label for="cadastro-email">E-mail</label>
                    <input type="email" id="cadastro-email" required placeholder="Seu e-mail">
                </div>

                <div class="input-group">
                    <label for="cadastro-senha">Senha</label>
                    <input type="password" id="cadastro-senha" required placeholder="Sua senha">
                </div>

                <div class="input-group">
                    <label for="cadastro-confirmar">Confirmar Senha</label>
                    <input type="password" id="cadastro-confirmar" required placeholder="Confirme sua senha">
                </div>

                <button type="submit" class="btn-cta">Criar Conta</button>
            </form>

        </div>
    </main>

    <footer class="login-footer">
        <p>&copy; 2026 Clube do Livro. Desenvolvido com ❤️</p>
    </footer>

    <script type="module" src="../js/01_login.js"></script>

</body>

</html>
