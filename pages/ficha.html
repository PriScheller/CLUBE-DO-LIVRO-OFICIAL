<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clube - Ficha de Leitura</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/fichas.css">
</head>
<body>

    <header class="ficha-header">
        <div class="ficha-logo" onclick="window.location.href='estante.html'">
            <h1>📖 Meu Clube</h1>
        </div>
        <div>
            <a href="estante.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Estante</a>
        </div>
    </header>

    <main class="ficha-main">
        <h2 class="ficha-titulo-pagina">Ficha de Leitura</h2>

        <div class="ficha-dados-topo">
            <img src="" alt="Capa" class="ficha-moldura-capa" id="ficha-capa">
            
            <div class="ficha-tabela">
                <div class="ficha-linha cheia">
                    <div class="ficha-celula"><strong>Título:</strong> <span id="txt-titulo">Carregando...</span></div>
                </div>
                <div class="ficha-linha cheia">
                    <div class="ficha-celula"><strong>Autor:</strong> <span id="txt-autor">Carregando...</span></div>
                </div>
                <div class="ficha-linha">
                    <div class="ficha-celula"><strong>Editora:</strong> <span id="txt-editora">Carregando...</span></div>
                    <div class="ficha-celula"><strong>Edição:</strong> <input type="text" class="ficha-input-texto" id="input-edicao" placeholder="Ex: 1ª Ed."></div>
                </div>
                <div class="ficha-linha">
                    <div class="ficha-celula"><strong>Gênero:</strong> <span id="txt-genero">Carregando...</span></div>
                    <div class="ficha-celula"><strong>Páginas Totais:</strong> <input type="number" class="ficha-input-texto" id="input-paginas" placeholder="Ex: 320"></div>
                </div>
                <div class="ficha-linha">
                    <div class="ficha-celula"><strong>Página Atual:</strong> <input type="number" class="ficha-input-texto" id="input-pag-atual" placeholder="Ex: 45"> <span class="porcentagem-tag" id="label-porcentagem">0% lido</span></div>
                    <div class="ficha-celula"><strong>Início:</strong> <input type="date" class="ficha-input-texto" id="input-data-inicio"></div>
                </div>
                <div class="ficha-linha cheia">
                    <div class="ficha-celula"><strong>Término:</strong> <input type="date" class="ficha-input-texto" id="input-data-termino"></div>
                </div>
                <div class="ficha-linha cheia">
                    <div class="ficha-celula rating-container">
                        <strong>Avaliação:</strong>
                        <div class="estrelas-cozy-wrapper" id="estrelas-interativas-container">
                            <div class="estrela-box" data-index="1"><div class="metade-esquerda"></div><div class="metade-direita"></div><i class="fa-regular fa-star"></i></div>
                            <div class="estrela-box" data-index="2"><div class="metade-esquerda"></div><div class="metade-direita"></div><i class="fa-regular fa-star"></i></div>
                            <div class="estrela-box" data-index="3"><div class="metade-esquerda"></div><div class="metade-direita"></div><i class="fa-regular fa-star"></i></div>
                            <div class="estrela-box" data-index="4"><div class="metade-esquerda"></div><div class="metade-direita"></div><i class="fa-regular fa-star"></i></div>
                            <div class="estrela-box" data-index="5"><div class="metade-esquerda"></div><div class="metade-direita"></div><i class="fa-regular fa-star"></i></div>
                        </div>
                        <span class="nota-num-display" id="nota-display-texto">(0.0)</span>

                        <button class="btn-favorito" id="btn-favorito-coracao" type="button">
                            <i class="fa-regular fa-heart" id="icone-coracao"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="formato-container">
            <label class="formato-label"><input type="radio" name="formatoLeitura" value="Livro Físico" checked> Livro Físico ⭕</label>
            <label class="formato-label"><input type="radio" name="formatoLeitura" value="E-reader"> E-reader ⭕</label>
            <label class="formato-label"><input type="radio" name="formatoLeitura" value="Audiobook"> Audiobook ⭕</label>
        </div>

        <button class="btn-salvar-ficha-global" id="btn-salvar-ficha-inteira">Salvar Alterações da Ficha</button>

        <section class="secao-comentarios">
            <h3 class="subtitulo-ficha">Resumo e Comentários do Livro</h3>
            
            <div class="comentario-box-input">
                <div class="editor-toolbar">
                    <div class="toolbar-group">
                        <button class="btn-tool" id="btn-format-b" type="button"><b>B</b></button>
                        <button class="btn-tool" id="btn-format-i" type="button"><i>I</i></button>
                        <button class="btn-tool" id="btn-format-u" type="button"><u>U</u></button>
                    </div>
                    <div class="emoji-picker-inline">
                        <span class="emoji-option">📖</span><span class="emoji-option">✨</span><span class="emoji-option">❤️</span><span class="emoji-option">😢</span><span class="emoji-option">😮</span><span class="emoji-option">👑</span><span class="emoji-option">🔍</span>
                    </div>
                </div>
                <textarea class="textarea-comentario" id="textarea-novo-comentario" placeholder="Escreva um comentário ou selecione o texto para formatar..."></textarea>
                <div class="box-action-footer">
                    <button class="btn-salvar-comentario" id="btn-adicionar-comentario" type="button">Adicionar Comentário</button>
                </div>
            </div>

            <div class="historico-comentarios" id="container-historico-comentarios"></div>
        </section>
    </main>

    <script type="module" src="../js/ficha.js"></script>
</body>
</html>
