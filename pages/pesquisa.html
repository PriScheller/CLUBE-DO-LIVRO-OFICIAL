<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clube - Resultados da Busca</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/estante.css">
    <style>
        /* Mantendo a identidade visual idêntica à Dashboard */
        .dash-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background-color: #fff; border-bottom: 1px solid #f0e4e6; }
        .dash-logo h1 { margin: 0; font-size: 1.4rem; color: var(--marrom-cozy); }
        .dash-search-container { flex: 1; max-width: 500px; margin: 0 2rem; }
        .dash-search-form { display: flex; gap: 0.5rem; }
        .dash-search-input { width: 100%; padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid #ddd; font-size: 0.9rem; }
        .dash-search-btn { padding: 0.6rem 1.2rem; background-color: var(--rosa-pastel-medio); color: var(--marrom-cozy); border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .pesquisa-main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .resultados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .busca-card { display: flex; gap: 1rem; background: #fff; padding: 1rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .busca-capa { width: 90px; height: 130px; object-fit: cover; border-radius: 6px; background-color: #fff0f2; }
        .busca-info { display: flex; flex-direction: column; justify-content: space-between; flex: 1; }
        .busca-info h4 { margin: 0 0 0.3rem 0; font-size: 1rem; color: #333; }
        .busca-info p { margin: 0 0 0.2rem 0; font-size: 0.85rem; color: #666; }
        .select-categoria { width: 100%; padding: 0.4rem; border-radius: 8px; border: 1px solid #ccc; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .btn-add-pesquisa { width: 100%; padding: 0.5rem; background-color: var(--rosa-pastel-medio); color: var(--marrom-cozy); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-voltar { background: none; border: 1px solid var(--marrom-cozy); padding: 0.5rem 1.2rem; border-radius: 15px; color: var(--marrom-cozy); font-weight: bold; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="dash-header">
        <div class="dash-logo">
            <h1 style="cursor: pointer;" onclick="window.location.href='dashboard.html'">📖 Meu Clube</h1>
        </div>
        
        <div class="dash-search-container">
            <div class="dash-search-form">
                <input type="text" id="input-termo-busca" class="dash-search-input" placeholder="Pesquisar outro livro ou ISBN...">
                <button type="button" id="btn-executar-busca" class="dash-search-btn">Pesquisar</button>
            </div>
        </div>

        <div>
            <a href="dashboard.html" class="btn-voltar">Painel</a>
        </div>
    </header>

    <main class="pesquisa-main">
        <h2 id="titulo-resultados" style="color: var(--marrom-cozy); font-family: serif;">📚 Livros Encontrados</h2>
        
        <div class="resultados-grid" id="container-resultados">
            <p style="color: #888; grid-column: 1/-1; text-align: center;">Carregando resultados da biblioteca global...</p>
        </div>
    </main>

    <script type="module" src="../js/pesquisa.js"></script>
</body>
</html>
